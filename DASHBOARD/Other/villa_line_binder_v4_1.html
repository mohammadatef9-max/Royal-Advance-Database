<title>Villa Line Binder v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0b0e14;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
.topbar{height:48px;background:#11151c;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0}
.topbar h1{font-size:13px;font-weight:700;color:#93b6ff;white-space:nowrap}
.tb-sep{flex:1}
.btn{padding:5px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:#151a23;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:#4f8cff;color:#93b6ff;background:rgba(79,140,255,0.12)}
.btn.success{border-color:rgba(34,197,94,0.5);color:#22c55e}
.btn.success:hover{background:rgba(34,197,94,0.12)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.vi-in{background:#151a23;border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;padding:5px 8px;border-radius:6px;font-size:12px;font-family:monospace;font-weight:700;width:85px;outline:none}
.vi-in:focus{border-color:#4f8cff}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:230px;background:#0f1319;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sid-sec{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.05)}
.sid-lbl{font-size:9px;color:#4a5568;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.prog-wrap{background:#151a23;border-radius:4px;height:5px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;background:#4f8cff;border-radius:4px;transition:width .3s}
.prog-txt{font-size:9px;color:#4a5568;margin-top:3px;font-family:monospace}
.leg-row{display:flex;align-items:center;gap:6px;font-size:10px;color:#64748b;margin-bottom:3px}
.leg-line{width:28px;height:3px;border-radius:2px;flex-shrink:0}
.bound-list{flex:1;overflow-y:auto}
.bound-list::-webkit-scrollbar{width:4px}
.bound-list::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}
.vi-item{padding:4px 12px;font-size:10px;display:flex;align-items:center;gap:5px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.vi-item:hover{background:rgba(79,140,255,0.06)}
.vi-item.active{background:rgba(79,140,255,0.12);border-left-color:#4f8cff;color:#93b6ff}
.vi-id{font-family:monospace;font-weight:700;flex:1}
.vi-cnt{font-size:9px;color:#4a5568;background:#151a23;padding:1px 5px;border-radius:3px}
.vi-del{width:15px;height:15px;border-radius:3px;background:rgba(248,113,113,0.1);color:#f87171;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;flex-shrink:0}
.vi-item:hover .vi-del{opacity:1}
.map-wrap{flex:1;overflow:hidden;position:relative;background:#07090f}
#svg-root{width:100%;height:100%;display:block;cursor:crosshair}
.statusbar{height:22px;background:#0a0d12;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;padding:0 12px;gap:14px;font-size:9px;color:#4a5568;font-family:monospace;flex-shrink:0}
.statusbar b{color:#93b6ff}
.zoom{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zb{width:28px;height:28px;background:#151a23;border:1px solid rgba(255,255,255,0.07);border-radius:6px;color:#93b6ff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;user-select:none}
.zb:hover{background:rgba(79,140,255,0.15)}
</style>
</head>

function buildPolygon(idxs) {
  if (!idxs || idxs.length === 0) return [];
  const snap = v => Math.round(v * 4) / 4;
  const key  = (x,y) => snap(x)+','+snap(y);
  const dist = (a,b) => Math.hypot(a[0]-b[0], a[1]-b[1]);

  // Build adjacency
  const adj = {};
  const ptCoords = {};
  idxs.forEach(i => {
    const [x1,y1,x2,y2] = LINES[i];
    const k1=key(x1,y1), k2=key(x2,y2);
    ptCoords[k1]=[snap(x1),snap(y1)];
    ptCoords[k2]=[snap(x2),snap(y2)];
    if(!adj[k1]) adj[k1]=new Set();
    if(!adj[k2]) adj[k2]=new Set();
    if(k1!==k2){ adj[k1].add(k2); adj[k2].add(k1); }
  });

  const allKeys = Object.keys(adj);
  if (!allKeys.length) return [];

  // Start from a degree-1 point if possible
  const start = allKeys.find(k=>adj[k].size===1) || allKeys[0];
  const visited = new Set([start]);
  const path = [ptCoords[start]];
  let cur = start;

  for (let step=0; step<600; step++) {
    // Direct neighbor
    const nbrs = [...adj[cur]].filter(n=>!visited.has(n));
    let nxt = null;
    if (nbrs.length) {
      nxt = nbrs[0];
    } else {
      // Gap-fill: nearest unvisited point
      const unvisited = allKeys.filter(k=>!visited.has(k));
      if (!unvisited.length) break;
      const curPt = ptCoords[cur];
      nxt = unvisited.reduce((best,k)=>
        dist(ptCoords[k],curPt) < dist(ptCoords[best],curPt) ? k : best
      );
      // Stop if gap is too large (not the same villa)
      if (dist(ptCoords[nxt], ptCoords[cur]) > 150) break;
    }
    visited.add(nxt);
    path.push(ptCoords[nxt]);
    cur = nxt;
    if (visited.size === allKeys.size) break;
  }
  return path;
}

const lineKey = l => l[0].toFixed(2)+','+l[1].toFixed(2)+','+l[2].toFixed(2)+','+l[3].toFixed(2);
const lineIndex = {};
LINES.forEach((l,i) => lineIndex[lineKey(l)] = i);
const remapped = {};
for (const [vid, coordsList] of Object.entries(bindings)) {
  remapped[vid] = coordsList.map(l => lineIndex[lineKey(l)]).filter(i => i !== undefined);
}
bindings = remapped;

let selected = new Set();
let activeVilla = null;
let lineEls = [];
let vb = {x:0,y:0,w:960,h:860};
let panDrag = null;
const svg = document.getElementById('svg-root');
const previewG = document.getElementById('preview-g');

const C_DEFAULT='#1e3a5f', C_BOUND='#22c55e', C_ACTIVE='#4f8cff', C_SEL='#f97316';
const W_DEFAULT=1.0, W_BOUND=1.8, W_ACTIVE=2.2, W_SEL=2.8;

let revIdx = {};
function buildRevIdx() {
  revIdx = {};
  for (const [vid,idxs] of Object.entries(bindings))
    for (const i of idxs) { if(!revIdx[i]) revIdx[i]=new Set(); revIdx[i].add(vid); }
}

function updateLine(i) {
  const el=lineEls[i]; if(!el) return;
  const isSel=selected.has(i);
  const activeSet=activeVilla?new Set(bindings[activeVilla]||[]):new Set();
  const isActive=activeSet.has(i);
  const isBound=revIdx[i]&&revIdx[i].size>0;
  if(isSel)        { el.setAttribute('stroke',C_SEL);     el.setAttribute('stroke-width',W_SEL); }
  else if(isActive){ el.setAttribute('stroke',C_ACTIVE);  el.setAttribute('stroke-width',W_ACTIVE); }
  else if(isBound) { el.setAttribute('stroke',C_BOUND);   el.setAttribute('stroke-width',W_BOUND); }
  else             { el.setAttribute('stroke',C_DEFAULT); el.setAttribute('stroke-width',W_DEFAULT); }
}

function updateAllLines() {
  buildRevIdx();
  for(let i=0;i<LINES.length;i++) updateLine(i);
}

function updatePreview() {
  previewG.innerHTML='';
  if(selected.size < 2) return;
  const poly = buildPolygon([...selected]);
  if(poly.length < 3) return;
  const pts = poly.map(p=>p[0]+','+p[1]).join(' ');
  const el = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  el.setAttribute('points',pts);
  el.setAttribute('fill','rgba(249,115,22,0.15)');
  el.setAttribute('stroke','#f97316');
  el.setAttribute('stroke-width','0.8');
  el.setAttribute('stroke-dasharray','4,3');
  el.setAttribute('pointer-events','none');
  previewG.appendChild(el);
}

function initSVG() {
  const linesG=document.getElementById('lines-g');
  const hitG=document.getElementById('hit-g');
  const labG=document.getElementById('labels-g');
  LINES.forEach((seg,i) => {
    const [x1,y1,x2,y2]=seg;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    ln.setAttribute('stroke',C_DEFAULT); ln.setAttribute('stroke-width',W_DEFAULT);
    ln.setAttribute('fill','none'); ln.setAttribute('stroke-linecap','round');
    linesG.appendChild(ln); lineEls.push(ln);
    const hit=document.createElementNS('http://www.w3.org/2000/svg','line');
    hit.setAttribute('x1',x1); hit.setAttribute('y1',y1);
    hit.setAttribute('x2',x2); hit.setAttribute('y2',y2);
    hit.setAttribute('stroke','transparent'); hit.setAttribute('stroke-width','9');
    hit.setAttribute('fill','none'); hit.style.cursor='pointer';
    hit.addEventListener('click',e=>{e.stopPropagation();toggleLine(i);});
    hitG.appendChild(hit);
  });
  for(const [vid,[x,y]] of Object.entries(LABELS)) {
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x); t.setAttribute('y',y); t.setAttribute('font-size','3.5');
    t.setAttribute('fill','rgba(147,182,255,0.7)'); t.setAttribute('dominant-baseline','middle');
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-family','monospace');
    t.setAttribute('pointer-events','none'); t.setAttribute('data-id',vid);
    t.textContent=vid; labG.appendChild(t);
  }
}

function toggleLine(i) {
  if(selected.has(i)) selected.delete(i); else selected.add(i);
  updateLine(i); updateCounts(); updatePreview();
}

function bindVilla() {
  let vid=document.getElementById('vi-in').value.trim().toUpperCase();
  if(!vid) return;
  if(!vid.startsWith('VI-')) vid='VI-'+vid.padStart(3,'0');
  if(selected.size===0){alert('Select lines first');return;}
  const existing=new Set(bindings[vid]||[]);
  selected.forEach(i=>existing.add(i));
  bindings[vid]=[...existing];
  selected.clear(); previewG.innerHTML='';
  activeVilla=vid;
  buildRevIdx(); updateAllLines(); updateLabelColors(); updateCounts(); renderList(); autoSuggest(); save();
}

function deleteBinding(vid,e) {
  e.stopPropagation();
  if(!confirm('Delete binding for '+vid+'?')) return;
  const old=bindings[vid]||[];
  delete bindings[vid];
  if(activeVilla===vid) activeVilla=null;
  document.getElementById('vi-in').value=vid;
  buildRevIdx(); old.forEach(i=>updateLine(i)); updateLabelColors(); updateCounts(); renderList(); save();
}

function highlightVilla(vid) {
  const prev=activeVilla;
  activeVilla=activeVilla===vid?null:vid;
  if(prev&&bindings[prev]) bindings[prev].forEach(i=>updateLine(i));
  if(activeVilla&&bindings[activeVilla]) bindings[activeVilla].forEach(i=>updateLine(i));
  document.getElementById('sb-active').textContent=activeVilla||'—';
  renderList();
  if(activeVilla&&LABELS[activeVilla]){
    const [lx,ly]=LABELS[activeVilla];
    vb.x=lx-vb.w/2; vb.y=ly-vb.h/2; setVB();
  }
}

function clearSel() {
  const prev=[...selected]; selected.clear(); previewG.innerHTML='';
  prev.forEach(i=>updateLine(i)); updateCounts();
}

function jumpTo() {
  let val=document.getElementById('jump-in').value.trim();
  if(!val) return;
  let vid=val.toUpperCase();
  if(!vid.startsWith('VI-')) vid='VI-'+val.padStart(3,'0');
  if(LABELS[vid]){
    const [lx,ly]=LABELS[vid];
    vb.x=lx-vb.w/2; vb.y=ly-vb.h/2; setVB();
    highlightVilla(vid);
    document.getElementById('vi-in').value=vid;
  }
}

function updateCounts() {
  const sc=selected.size, bc=Object.keys(bindings).length;
  document.getElementById('sel-count').textContent=sc;
  document.getElementById('sb-sel').textContent=sc;
  document.getElementById('sb-bound').textContent=bc;
  document.getElementById('bound-count').textContent=bc;
  document.getElementById('bind-btn').disabled=sc===0;
  document.getElementById('prog-fill').style.width=(bc/320*100)+'%';
  document.getElementById('prog-txt').textContent=bc+' / 320';
}

function renderList() {
  const list=document.getElementById('bound-list');
  const sorted=Object.keys(bindings).sort((a,b)=>parseInt(a.split('-')[1])-parseInt(b.split('-')[1]));
  list.innerHTML='';
  sorted.forEach(vid=>{
    const d=document.createElement('div');
    d.className='vi-item'+(vid===activeVilla?' active':'');
    d.innerHTML=`<span class="vi-id">${vid}</span><span class="vi-cnt">${bindings[vid].length}L</span><button class="vi-del" onclick="deleteBinding('${vid}',event)">×</button>`;
    d.addEventListener('click',e=>{if(!e.target.classList.contains('vi-del'))highlightVilla(vid);});
    list.appendChild(d);
  });
  if(activeVilla){const el=list.querySelector('.active');if(el)el.scrollIntoView({block:'nearest'});}
}

function updateLabelColors() {
  document.querySelectorAll('text[data-id]').forEach(el=>{
    const vid=el.getAttribute('data-id');
    el.setAttribute('fill',bindings[vid]?'rgba(34,197,94,0.9)':'rgba(147,182,255,0.7)');
    el.setAttribute('font-weight',bindings[vid]?'700':'400');
  });
}

function autoSuggest() {
  for(let i=1;i<=320;i++){
    const vid='VI-'+String(i).padStart(3,'0');
    if(!bindings[vid]){document.getElementById('vi-in').value=vid;return;}
  }
  document.getElementById('vi-in').value='';
}

function save() {
  const out={};
  for(const [vid,idxs] of Object.entries(bindings)) out[vid]=idxs.map(i=>LINES[i]);
  localStorage.setItem('c3_bindings_v4',JSON.stringify(out));
}

function exportData() {
  // Build final output with auto-closed polygons
  const out={};
  for(const [vid,idxs] of Object.entries(bindings)) {
    const poly = buildPolygon(idxs);
    out[vid] = { lines: idxs.map(i=>LINES[i]), polygon: poly };
  }
  const blob=new Blob([JSON.stringify({bindings:out,meta:{total_bound:Object.keys(bindings).length}},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='c3_villa_bindings_v3.json'; a.click();
  save();
  alert('Exported '+Object.keys(bindings).length+' villas with auto-closed polygons!');
}

function setVB() {
  svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  const fs=Math.max(2,Math.min(14,3.5*vb.w/960));
  document.querySelectorAll('text[data-id]').forEach(l=>l.setAttribute('font-size',fs));
}
function zoom(f){const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;vb.w*=f;vb.h*=f;vb.x=cx-vb.w/2;vb.y=cy-vb.h/2;setVB();}
function resetView(){vb={x:0,y:0,w:960,h:860};setVB();}

svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?0.85:1.18,r=svg.getBoundingClientRect();
  const mx=vb.x+(e.clientX-r.left)/r.width*vb.w,my=vb.y+(e.clientY-r.top)/r.height*vb.h;
  vb.w*=f;vb.h*=f;vb.x=mx-(e.clientX-r.left)/r.width*vb.w;vb.y=my-(e.clientY-r.top)/r.height*vb.h;setVB();
},{passive:false});
svg.addEventListener('mousedown',e=>{
  if(e.button===1||e.button===2){e.preventDefault();panDrag={x:e.clientX,y:e.clientY,vx:vb.x,vy:vb.y};}
});
window.addEventListener('mousemove',e=>{
  if(panDrag){const r=svg.getBoundingClientRect();vb.x=panDrag.vx-(e.clientX-panDrag.x)/r.width*vb.w;vb.y=panDrag.vy-(e.clientY-panDrag.y)/r.height*vb.h;setVB();}
  const r=svg.getBoundingClientRect();
  document.getElementById('sb-xy').textContent=(vb.x+(e.clientX-r.left)/r.width*vb.w).toFixed(1)+','+(vb.y+(e.clientY-r.top)/r.height*vb.h).toFixed(1);
});
window.addEventListener('mouseup',()=>panDrag=null);
svg.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement!==document.getElementById('jump-in')){e.preventDefault();bindVilla();}
  if(e.key==='Escape') clearSel();
});

initSVG();
buildRevIdx(); updateAllLines(); updateLabelColors(); updateCounts(); renderList(); autoSuggest();
setInterval(save, 30000);
</script>
</body>
